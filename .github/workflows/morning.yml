name: Morning Edition

# 7:00 AM US Central. Two UTC times cover daylight and standard time; the code
# checks the real Central hour and the off-season run simply exits early.
on:
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}        # the manual "Run workflow" button (for testing)

permissions:
  contents: write              # lets the job publish the web edition into docs/

concurrency:
  group: alpha-article-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send the morning edition
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.build --edition morning

      - name: Publish the web edition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Publish morning edition"
          git push
